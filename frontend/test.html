<!DOCTYPE html>
<html>
<head>
    <title>MediAgent Test</title>
</head>
<body>
    <h1>Hello World - Frontend is Working!</h1>
    <p>If you see this, the frontend server is running.</p>
    <button onclick="testAPI()">Test Backend Connection</button>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing connection to backend...';
            
            try {
                const response = await fetch('http://localhost:8000/health');
                const data = await response.json();
                resultDiv.innerHTML = '<pre>Backend response: ' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                resultDiv.innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
