services:
  postgres:
    image: postgres:15-alpine
    container_name: mediagent-postgres
    environment:
      POSTGRES_USER: mediagent
      POSTGRES_PASSWORD: mediagent123
      POSTGRES_DB: mediagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mediagent-network

  redis:
    image: redis:7-alpine
    container_name: mediagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mediagent-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: mediagent-backend
    environment:
      # ✅ Updated to use NeonDB (Cloud PostgreSQL)
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    networks:
      - mediagent-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: mediagent-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mediagent-network

  #evaluation:
  #  build:
  #    context: .
  #    dockerfile: Dockerfile.evaluation
  #  container_name: mediagent-evaluation
  #  volumes:
  #    - ./evaluation:/app
  #  depends_on:
  #    - backend
  #  networks:
  #    - mediagent-network

volumes:
  postgres_data:
  redis_data:

networks:
  mediagent-network:
    driver: bridge