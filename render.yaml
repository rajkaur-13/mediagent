services:
  - type: web
    name: mediagent-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 10000
    plan: free
    rootDir: backend
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NEON_DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
